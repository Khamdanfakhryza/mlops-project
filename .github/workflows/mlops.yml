name: MLOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install library
        run: |
          pip install mlflow scikit-learn pandas joblib

      - name: Run training
        run: |
          cd MLProject
          python modelling.py
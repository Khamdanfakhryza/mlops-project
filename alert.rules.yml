groups:
  - name: ml-api-alerts
    rules:

      - alert: HighRequestRate
        expr: rate(http_requests_total[1m]) > 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High request rate detected"

      - alert: HighErrorRate
        expr: http_errors_total > 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Error detected in API"